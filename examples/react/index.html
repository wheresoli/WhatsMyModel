<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What's My Model? — React example</title>
    <!-- Buildless: React from a CDN, local packages via an import map. -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "@whats-my-model/core": "/packages/core/src/index.js",
          "@whats-my-model/widget": "/packages/widget/src/index.js",
          "@whats-my-model/catalog-huggingface": "/packages/catalog-huggingface/src/index.js",
          "@whats-my-model/catalog-huggingface/snapshot": "/packages/catalog-huggingface/src/snapshot.js",
          "@whats-my-model/react": "/packages/react/src/index.js"
        }
      }
    </script>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.5; }
      code { background: rgba(127,127,127,.15); padding: 1px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>What's My Model? — React</h1>
    <p>The same Web Component, driven through the <code>@whats-my-model/react</code> wrapper.</p>
    <div id="root"></div>

    <script type="module">
      import { createElement as h, useMemo, useState } from "react";
      import { createRoot } from "react-dom/client";
      import { WhatsMyModel } from "@whats-my-model/react";
      import { manualHardwareProvider } from "@whats-my-model/core";
      import { snapshotCatalogProvider } from "@whats-my-model/catalog-huggingface/snapshot";

      const GB = 2 ** 30;

      function App() {
        const [picked, setPicked] = useState(null);
        // Memoize provider props so the wrapper doesn't re-configure every render.
        const hardwareProvider = useMemo(
          () => manualHardwareProvider({ gpu: { name: "RTX 4080", total: 16 * GB }, ram: { total: 32 * GB } }),
          [],
        );
        const catalogProvider = useMemo(() => snapshotCatalogProvider(), []);
        return h(
          "div",
          null,
          h(WhatsMyModel, {
            task: "code",
            preference: "balanced",
            targetContext: 32768,
            hardwareProvider,
            catalogProvider,
            onSelect: (v) => setPicked(v),
          }),
          h("p", null, "Selected: ", h("code", { id: "picked" }, picked ? `${picked.name} · ${picked.quant}` : "(none)")),
        );
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
