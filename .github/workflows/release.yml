name: Publish to npm

# Publishes all packages to npm when you push a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Requires an NPM_TOKEN repo secret (Settings > Secrets and variables > Actions)
# with publish rights to the @whats-my-model scope.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Test
        run: node --test packages/*/src/*.test.js
      - name: Publish in dependency order
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core catalog-huggingface widget react; do
            echo "::group::@whats-my-model/$pkg"
            npm publish "packages/$pkg" --access public \
              || echo "skipped @whats-my-model/$pkg (that version may already be published)"
            echo "::endgroup::"
          done
