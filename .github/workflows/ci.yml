name: CI

# Runs the whole test suite on every push to main and every PR, so regressions
# are caught before merge (previously tests only ran inside the publish workflow).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Packages are dependency-free at test time (node:test + local imports),
      # so no install step is needed.
      - name: Test
        run: node --test packages/*/src/*.test.js
